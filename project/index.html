function genMarks(seed) {
  const o = [];

  for (let i = 0; i < 5; i++) {
    o.push({ type: "o", x: 18 + ((i * 13 + seed * 7) % 30), y: 18 + ((i * 17 + seed * 11) % 64) });
    x.push({ type: "x", x: 50 + ((i * 11 + seed * 13) % 30), y: 18 + ((i * 19 + seed * 5) % 64) });
  }
  const ball = { type: "ball", x: o[0].x, y: o[0].y };
  const arrows = [
    { type: "arrow", x: o[0].x, y: o[0].y, x2: o[2].x, y2: o[2].y },
    { type: "arrow", x: o[1].x, y: o[1].y, x2: 55 + (seed % 18), y2: 35 + (seed % 30) },

  return [...o, ...x, ball, ...arrows];
}

<script type="text/babel">
// Field diagram renderer for schemes/formations.
// Renders x's, o's, ball, and arrows on a striped pitch placeholder.
// Coords are 0-100 (x = horizontal across field, y = vertical).

function FieldDiagram({ marks, ratio = "16 / 10", small = false }) {
  // viewBox is 100 wide x 60 tall — slight letterbox feel
  const VBW = 100, VBH = 60;
  const ms = (marks || []).map((m) => ({
    ...m,
    // y is 0-100 in data; map into 0-60
    cy: (m.y / 100) * VBH,
    cy2: m.y2 != null ? (m.y2 / 100) * VBH : null,
  }));

  const r = small ? 2.6 : 3.0;
  const stroke = small ? 0.7 : 0.8;

  return (
    <svg
      viewBox={`0 0 ${VBW} ${VBH}`}
      preserveAspectRatio="none"
      style={{
        width: "100%",
        aspectRatio: ratio,
        display: "block",
        background: "#F4F8EA",
        borderBottom: small ? "1px solid var(--border)" : "none",
      }}
    >
      <defs>
        <pattern id={`stripes-${small ? "s" : "l"}`} width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(0)">
          <rect width="6" height="6" fill="#F4F8EA" />
          <rect x="0" width="3" height="6" fill="#EFF4DE" />
        </pattern>
        <marker id={`arrowHead-${small ? "s" : "l"}`} markerWidth="6" markerHeight="6" refX="4.5" refY="3" orient="auto">
          <path d="M0,0 L5,3 L0,6 z" fill="var(--fg)" />
        </marker>
      </defs>

      {/* Pitch */}
      <rect x="0" y="0" width={VBW} height={VBH} fill={`url(#stripes-${small ? "s" : "l"})`} />
      {/* Boundary */}
      <rect x="1" y="1" width={VBW - 2} height={VBH - 2} fill="none" stroke="#A8B47A" strokeWidth={stroke} />
      {/* Halfway line */}
      <line x1={VBW / 2} y1="1" x2={VBW / 2} y2={VBH - 1} stroke="#A8B47A" strokeWidth={stroke} strokeDasharray="1.5 1.5" />
      {/* Center spot */}
      <circle cx={VBW / 2} cy={VBH / 2} r="1" fill="#A8B47A" />
      {/* Goal areas */}
      <rect x="1" y={VBH / 2 - 8} width="6" height="16" fill="none" stroke="#A8B47A" strokeWidth={stroke} />
      <rect x={VBW - 7} y={VBH / 2 - 8} width="6" height="16" fill="none" stroke="#A8B47A" strokeWidth={stroke} />

      {/* Arrows behind marks */}
      {ms
        .filter((m) => m.type === "arrow")
        .map((m, i) => (
          <line
            key={`a${i}`}
            x1={m.x}
            y1={m.cy}
            x2={m.x2}
            y2={m.cy2}
            stroke="var(--fg)"
            strokeWidth={stroke * 0.9}
            strokeDasharray="1.6 1.4"
            markerEnd={`url(#arrowHead-${small ? "s" : "l"})`}
            opacity="0.8"
          />
        ))}

      {/* Marks */}
      {ms.map((m, i) => {
        if (m.type === "o") {
          return (
            <circle key={i} cx={m.x} cy={m.cy} r={r}
              fill="#FFFFFF" stroke="var(--info-text)" strokeWidth={stroke * 1.4} />
          );
        }
        if (m.type === "x") {
          const d = r * 0.85;
          return (
            <g key={i} stroke="var(--error-text)" strokeWidth={stroke * 1.5} strokeLinecap="round">
              <line x1={m.x - d} y1={m.cy - d} x2={m.x + d} y2={m.cy + d} />
              <line x1={m.x + d} y1={m.cy - d} x2={m.x - d} y2={m.cy + d} />
            </g>
          );
        }
        if (m.type === "ball") {
          return (
            <circle key={i} cx={m.x} cy={m.cy} r={r * 0.55}
              fill="#272520" stroke="#FFFFFF" strokeWidth={stroke * 0.6} />
          );
        }
        return null;
      })}
    </svg>
  );
}

window.FieldDiagram = FieldDiagram;

</script>

// Distribute blocks across N pages so the reader shows multiple paged sheets.
function paginateBlocks(blocks, pageCount) {
  if (!blocks.length) return [];
  // We don't have real pagination; just split blocks evenly into N pages.
  const pages = [];
  const target = Math.ceil(blocks.length / Math.max(1, pageCount));
  for (let i = 0; i < pageCount; i++) {
    const slice = blocks.slice(i * target, (i + 1) * target);
    if (slice.length) pages.push(slice);
  }
  // If we ran out of blocks before reaching pageCount, just return what we have.
  return pages;
}

function renderBlock(block, idx) {
  switch (block.type) {
    case "heading": return <div key={idx} style={previewStyles.docHeading}>{block.text}</div>;
    case "h2":      return <div key={idx} style={previewStyles.docH2}>{block.text}</div>;
    case "h3":      return <div key={idx} style={previewStyles.docH3}>{block.text}</div>;
    case "p":       return <p key={idx} style={previewStyles.docP}>{block.text}</p>;
    case "list":    return (
      <ul key={idx} style={previewStyles.docList}>
        {block.items.map((it, j) => <li key={j} style={{ marginBottom: 4 }}>{it}</li>)}
      </ul>
    );
    case "quote":   return <div key={idx} style={previewStyles.docQuote}>{block.text}</div>;
    case "divider": return <div key={idx} style={previewStyles.docDivider} />;
    default:        return null;
  }
}

function DocReader({ body }) {
  // Take pageCount from body; pad blocks across pages.
  const pages = paginateBlocks(body.blocks, body.pageCount || 1);
  return (
    <React.Fragment>
      <div style={previewStyles.docToolbar}>
        <span style={previewStyles.docToolbarChip}>
          <Ic.doc size={11} /> {body.fileType || "PDF"}
        </span>
        <span style={previewStyles.docToolbarChip}>
          {body.pageCount} pages
        </span>
        <span style={previewStyles.docToolbarChip}>
          ~{body.wordCount.toLocaleString()} words
        </span>
        {body.fileSize && (
          <span style={{ ...previewStyles.docToolbarChip, marginLeft: "auto" }}>
            {body.fileSize}
          </span>
        )}
      </div>
      <div style={previewStyles.docReader}>
        {pages.map((blocks, i) => (
          <div key={i} style={previewStyles.docPage}>
            {blocks.map(renderBlock)}
            <div style={previewStyles.docPageNum}>{i + 1} / {body.pageCount}</div>
          </div>
        ))}
      </div>
    </React.Fragment>
  );
}

function PreviewPanel({ item, isAdded, onClose, onAdd }) {
  const open = !!item;

  React.useEffect(() => {
    if (!open) return;
    const prev = document.body.style.overflow;
    document.body.style.overflow = "hidden";
    return () => { document.body.style.overflow = prev; };
  }, [open]);

  React.useEffect(() => {
    if (!open) return;
    function onKey(e) { if (e.key === "Escape") onClose(); }
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [open, onClose]);

  const kindLabel = item ? (
    item.kind === "video" ? "Video" :
    item.kind === "scheme" ? "Scheme / Formation" :
    "Document"
  ) : "";

  const isDoc = item && item.kind === "doc";
  const docBody = isDoc
    ? (window.SEED.DOC_BODY_MAP[item.id] || window.SEED.DEFAULT_DOC_BODY)
    : null;

  return (
    <React.Fragment>
      <div
        style={{ ...previewStyles.scrim, ...(open ? previewStyles.scrimOpen : {}) }}
        onClick={onClose}
      />
      <aside
        style={{
          ...previewStyles.panel,
          ...(isDoc ? previewStyles.panelDoc : previewStyles.panelMedia),
          ...(open ? previewStyles.panelOpen : {}),
        }}
        aria-hidden={!open}
      >
        {item && (
          <React.Fragment>
            <div style={previewStyles.header}>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={previewStyles.eyebrow}>
                  <Ic.eye size={12} /> Preview · {kindLabel}
                </div>
                <div style={previewStyles.title}>{item.name}</div>
              </div>
              <button style={previewStyles.closeBtn} onClick={onClose} aria-label="Close preview">
                <Ic.close size={14} />
              </button>
            </div>

            <div style={previewStyles.body}>
              {item.kind === "video" && (
                <div style={previewStyles.videoMedia}>

function buildMeta(item, mode) {
  const kind = item.kind === "video" ? "Video" : item.kind === "scheme" ? "Scheme" : "Document";
  const dur = item.duration ? ` · ${item.duration}` : "";
  if (mode === "org-source") return `${kind}${dur} · Added ${item.addedToOrg}`;
  if (mode === "org-added")  return `${kind}${dur} · From org library · Not yet published`;
  return item.meta;
}

function ContentRow({ item, mode, isAdded, justChanged, onAdd, onRemove, onPreview }) {
  const isVideo  = item.kind === "video";
  const isScheme = item.kind === "scheme";
  // Show org badge in the personal library where provenance matters.
  // In the org library itself (org-source) the context strip makes it clear.
  const showOrgBadge = mode === "org-added";

  let restAction = null;
  let hoverAction = null;

  if (mode === "own") {
    restAction = (

        onClick={(e) => e.stopPropagation()}>
        <Ic.ellipsis />

    );
  } else if (mode === "org-source") {
    if (isAdded) {
      const btn = (
        <button className="btn-added" style={btnBase} aria-label="Already added"
          onClick={(e) => e.stopPropagation()}>
          <Ic.check size={11} /> Added

      );

        <button className="btn-add" style={btnBase}
          onClick={(e) => { e.stopPropagation(); onAdd(item.id); }}>
          <Ic.plus size={11} /> Add to my library

        onClick={(e) => { e.stopPropagation(); onRemove(item.id); }}>
        <Ic.minus size={11} /> Remove from my library

  const persistent = mode === "org-source" && isAdded;
  const clickable = mode === "org-source" || mode === "org-added";

  return (

      className={`cr${justChanged ? " pulse" : ""}`}
      onClick={() => clickable && onPreview && onPreview(item)}
      style={{ cursor: clickable ? "pointer" : "default" }}

        {isVideo ? <Ic.play size={16} /> : isScheme ? <Ic.field size={16} /> : <Ic.doc size={16} />}

      <div style={rowStyles.info}>
        <div style={rowStyles.nameLine}>
          <span style={rowStyles.name}>{item.name}</span>

              <Ic.building size={11} /> {ORG.name}

        </div>
        <div style={rowStyles.meta}>{buildMeta(item, mode)}</div>
      </div>

      <div style={rowStyles.actionSlot}>
        {persistent ? (
          <div style={rowStyles.actionItem}>{restAction}</div>
        ) : (
          <React.Fragment>
            {restAction && (
              <div className="rest-action" style={rowStyles.actionItem}>{restAction}</div>
            )}

              <div className="hover-action" style={rowStyles.actionItem}>{hoverAction}</div>

const carouselStyles = {
  controlsRow: {
    display: "flex", alignItems: "center", justifyContent: "space-between",

  },
  sectionTitle: {
    fontSize: 11, fontWeight: 600, color: "var(--muted)",

  count: {
    background: "var(--surface)", border: "1px solid var(--border)",
    borderRadius: 999, padding: "1px 7px",
    fontSize: 11, fontWeight: 500, color: "var(--muted)",
    letterSpacing: 0, textTransform: "none",
  },
  rightControls: { display: "flex", alignItems: "center", gap: 8 },
  viewAll: {
    fontSize: 12, color: "var(--muted)",
    background: "transparent", border: "none",
    cursor: "pointer", padding: "2px 4px",
    display: "inline-flex", alignItems: "center", gap: 4,
    textDecoration: "underline", textUnderlineOffset: 3,
    transition: "color 120ms",
  },
  arrows: { display: "flex", gap: 6 },
  arrow: {
    width: 30, height: 30,
    border: "1px solid var(--border)", background: "var(--card)",
    borderRadius: "var(--r-sm)",
    display: "grid", placeItems: "center",
    color: "var(--muted)", cursor: "pointer",
  },
  arrowDisabled: { opacity: 0.4, cursor: "not-allowed" },
};

function Carousel({ title, items, addedIds, justChangedId, onAdd, onPreview, CardComp, onViewAll }) {
  const trackRef = React.useRef(null);
  const [canPrev, setCanPrev] = React.useState(false);
  const [canNext, setCanNext] = React.useState(true);

  const update = React.useCallback(() => {
    const el = trackRef.current;
    if (!el) return;
    setCanPrev(el.scrollLeft > 4);
    setCanNext(el.scrollLeft + el.clientWidth < el.scrollWidth - 4);
  }, []);

  React.useEffect(() => {
    update();
    const el = trackRef.current;
    if (!el) return;
    el.addEventListener("scroll", update, { passive: true });
    window.addEventListener("resize", update);
    return () => {
      el.removeEventListener("scroll", update);
      window.removeEventListener("resize", update);
    };
  }, [update, items.length]);

  function nudge(dir) {
    const el = trackRef.current;
    if (!el) return;
    el.scrollBy({ left: dir * (el.clientWidth * 0.85), behavior: "smooth" });
  }

  return (
    <div>
      <div style={carouselStyles.controlsRow}>
        <div style={carouselStyles.sectionTitle}>
          {title} <span style={carouselStyles.count}>{items.length}</span>
        </div>
        <div style={carouselStyles.rightControls}>
          {onViewAll && (
            <button style={carouselStyles.viewAll} onClick={onViewAll}>
              View all
            </button>
          )}
          <div style={carouselStyles.arrows}>
            <button className="btn-ghost-h"
              style={{ ...carouselStyles.arrow, ...(canPrev ? {} : carouselStyles.arrowDisabled) }}
              onClick={() => nudge(-1)} disabled={!canPrev} aria-label="Previous">
              <Ic.arrowLeft size={14} />
            </button>
            <button className="btn-ghost-h"
              style={{ ...carouselStyles.arrow, ...(canNext ? {} : carouselStyles.arrowDisabled) }}
              onClick={() => nudge(1)} disabled={!canNext} aria-label="Next">
              <span style={{ display: "inline-flex", transform: "scaleX(-1)" }}>
                <Ic.arrowLeft size={14} />
              </span>
            </button>
          </div>
        </div>
      </div>

      <div ref={trackRef} className="carousel-track">
        {items.map((item) => (
          <CardComp
            key={item.id}
            item={item}
            isAdded={addedIds.includes(item.id)}
            justChanged={item.id === justChangedId}
            onAdd={onAdd}
            onPreview={onPreview}
          />
        ))}
      </div>
    </div>
  );
}

// ===========================================================================

// ===========================================================================

function ContentLibraryPage({ ownItems, addedOrgItems, onNavigateOrg, justChangedId, onRemove, onPreview }) {
  const [tab, setTab] = React.useState("docs");
  const [bannerOpen, setBannerOpen] = React.useState(true);

  const docs = [
    ...ownItems.filter((i) => i.kind === "doc"),
    ...addedOrgItems.filter((i) => i.kind === "doc" || i.kind === "scheme"),
  ];
  const videos = [
    ...ownItems.filter((i) => i.kind === "video"),
    ...addedOrgItems.filter((i) => i.kind === "video"),
  ];

  const totalDocs = docs.length;
  const totalVideos = videos.length;
  const unpublished = ownItems.filter((i) => !i.published).length + addedOrgItems.length;
  const published = ownItems.filter((i) => i.published).length;

  const list = tab === "docs" ? docs : videos;

  return (
    <div>
      <div style={clStyles.header}>
        <div>
          <div style={clStyles.title}>Content Library</div>
          <div style={clStyles.sub}>
            Your central hub for managing, editing, and publishing team content.
          </div>
        </div>
        <div style={clStyles.actions}>
          <button className="btn-ghost-h" style={clStyles.btnGhost} onClick={onNavigateOrg}>
            <Ic.building size={13} /> Browse Org Library
          </button>
          <button className="btn-primary-h" style={clStyles.btnPrimary}>
            <Ic.plus size={11} /> Upload New
          </button>
        </div>
      </div>

      <div style={clStyles.stats}>
        <StatCard label="Total documents" value={totalDocs} sub={`${totalDocs * 0} views`} icon={<Ic.doc size={13} />} />
        <StatCard label="Drill videos" value={totalVideos} sub={`${totalVideos * 0} views`} icon={<Ic.play size={12} />} />
        <StatCard label="Published" value={published} dot="g" icon={<Ic.check size={11} />} />
        <StatCard label="Unpublished" value={unpublished} dot="y" icon={<Ic.warn size={12} />} />
      </div>

      {bannerOpen && unpublished > 0 && (
        <div style={clStyles.banner}>
          <div style={clStyles.bannerHead}>
            <div style={clStyles.bannerTitle}>
              <Ic.warn size={14} /> {`${unpublished} unpublished item${unpublished === 1 ? "" : "s"}`}
            </div>
            <button style={clStyles.bannerDismiss} onClick={() => setBannerOpen(false)}>

      {list.length === 0 ? (

function TypeChip({ id, label, count, active, onClick }) {

        transition: "background 120ms, border-color 120ms, color 120ms",

function BrowseAllPage({ videos, schemes, docs, addedIds, onBack, onAdd, onPreview, justChangedId, defaultType }) {
  const [search, setSearch] = React.useState("");
  const [typeFilter, setTypeFilter] = React.useState(defaultType || "all");
  const [tagFilter, setTagFilter] = React.useState("all");
  const [sort, setSort] = React.useState("recent");

  const all = [...videos, ...schemes, ...docs];

  const filtered = React.useMemo(() => {
    let result = all.filter((item) => {
      if (typeFilter !== "all" && item.kind !== typeFilter) return false;
      if (tagFilter !== "all" && item.tag !== tagFilter) return false;
      if (search.trim()) {
        const q = search.trim().toLowerCase();
        return (
          item.name.toLowerCase().includes(q) ||
          (item.description && item.description.toLowerCase().includes(q))
        );
      }
      return true;
    });
    if (sort === "az") {
      result = [...result].sort((a, b) => a.name.localeCompare(b.name));
    }
    return result;
  }, [all, typeFilter, tagFilter, search, sort]);

  const counts = {
    all: all.length,
    video: videos.length,
    scheme: schemes.length,
    doc: docs.length,
  };

  const typeOptions = [
    { id: "all", label: "All" },
    { id: "video", label: "Videos" },
    { id: "scheme", label: "Schemes" },
    { id: "doc", label: "Documents" },
  ];

  return (
    <div>
      <button className="btn-ghost-h" style={olStyles.breadcrumb} onClick={onBack}>
        <Ic.arrowLeft size={13} /> Org Library
      </button>

      <div style={{ ...clStyles.header, marginTop: 4, marginBottom: 20 }}>
        <div>
          <div style={clStyles.title}>Browse All</div>
          <div style={clStyles.sub}>
            {ORG.name}'s complete library — {all.length} approved items across videos, schemes, and documents.
          </div>
        </div>
      </div>

      {/* Search + type filter + sort */}
      <div style={browseStyles.filterBar}>
        <div style={browseStyles.searchWrap}>
          <div style={browseStyles.searchIcon}>
            <Ic.search size={14} />
          </div>
          <input
            type="text"
            placeholder="Search by name or description…"
            value={search}
            onChange={(e) => setSearch(e.target.value)}
            className="browse-search"
            style={browseStyles.searchInput}
          />
        </div>

        <div style={browseStyles.chipRow}>
          {typeOptions.map(({ id, label }) => (
            <TypeChip
              key={id}
              id={id}
              label={label}
              count={id === "all" ? counts.all : id === "video" ? counts.video : id === "scheme" ? counts.scheme : counts.doc}
              active={typeFilter === id}
              onClick={() => setTypeFilter(id)}
            />
          ))}
        </div>

        <div style={browseStyles.sortRow}>
          <SortBtn id="recent" label="Recent" active={sort === "recent"} onClick={() => setSort("recent")} />
          <SortBtn id="az" label="A–Z" active={sort === "az"} onClick={() => setSort("az")} />
        </div>
      </div>

      {/* Results count + topic tags */}
      <div style={browseStyles.resultsLine}>
        <span style={browseStyles.resultsCount}>
          {filtered.length} result{filtered.length !== 1 ? "s" : ""}
          {search.trim() ? ` for "${search.trim()}"` : ""}
        </span>
        <div style={browseStyles.tagChipRow}>
          {["all", ...TAGS].map((tag) => (
            <TagChip
              key={tag}
              tag={tag}
              active={tagFilter === tag}
              onClick={() => setTagFilter(tag)}
            />
          ))}
        </div>
      </div>

      {/* Results list */}
      {filtered.length === 0 ? (
        <div style={clStyles.empty}>
          <div style={{ display: "grid", placeItems: "center", marginBottom: 12, color: "var(--border-hover)" }}>
            <Ic.inbox size={36} />
          </div>
          <div style={clStyles.emptyTitle}>No results</div>
          <div style={{ fontSize: 13 }}>
            Try a different search or clear the filters.
          </div>
        </div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {filtered.map((item) => (
            <ContentRow
              key={item.id}
              item={item}
              mode="org-source"
              isAdded={addedIds.includes(item.id)}
              justChanged={item.id === justChangedId}
              onAdd={onAdd}
              onPreview={onPreview}
            />
          ))}
        </div>
      )}
    </div>
  );
}

// ===========================================================================
// Root
// ===========================================================================

function App() {
  const [route, setRoute] = React.useState("library");
  const [addedIds, setAddedIds] = React.useState(PRE_ADDED_ORG_IDS);
  const [justChangedId, setJustChangedId] = React.useState(null);
  const [ownItems] = React.useState(COACH_OWN_ITEMS);
  const [previewId, setPreviewId] = React.useState(null);
  const [browseAllDefaultType, setBrowseAllDefaultType] = React.useState("all");

  const addedOrgItems = ALL_ORG_CONTENT.filter((i) => addedIds.includes(i.id));
  const previewItem = previewId ? findOrgItem(previewId) : null;

  function flashChange(id) {
    setJustChangedId(id);
    setTimeout(() => setJustChangedId((cur) => (cur === id ? null : cur)), 900);
  }
  function handleAdd(id) {
    if (!addedIds.includes(id)) {
      setAddedIds([...addedIds, id]);
      flashChange(id);
    }
  }
  function handleRemove(id) {
    setAddedIds(addedIds.filter((x) => x !== id));
  }
  function handlePreview(item) {
    if (!item) return;
    const isOrg = item.id.startsWith("org-") || item.id.startsWith("scheme-");
    if (!isOrg) return;
    setPreviewId(item.id);
  }
  function navigateBrowseAll(type) {
    setBrowseAllDefaultType(type || "all");
    setRoute("browse-all");
  }

  return (
    <React.Fragment>
      <Shell active={route} onNavigate={setRoute}>
        {route === "library" && (
          <ContentLibraryPage
            ownItems={ownItems}
            addedOrgItems={addedOrgItems}
            onNavigateOrg={() => setRoute("org-library")}
            justChangedId={justChangedId}
            onRemove={handleRemove}
            onPreview={handlePreview}
          />
        )}
        {route === "org-library" && (
          <OrgLibraryPage
            videos={ORG_VIDEOS}
            docs={ORG_DOCS}
            schemes={ORG_SCHEMES}
            addedIds={addedIds}
            onBack={() => setRoute("library")}
            onAdd={handleAdd}
            onPreview={handlePreview}
            justChangedId={justChangedId}
            onViewAll={navigateBrowseAll}
          />
        )}
        {route === "browse-all" && (
          <BrowseAllPage
            videos={ORG_VIDEOS}
            docs={ORG_DOCS}
            schemes={ORG_SCHEMES}
            addedIds={addedIds}
            onBack={() => setRoute("org-library")}
            onAdd={handleAdd}
            onPreview={handlePreview}
            justChangedId={justChangedId}
            defaultType={browseAllDefaultType}
          />
        )}
      </Shell>

      <PreviewPanel
        item={previewItem}
        isAdded={previewItem ? addedIds.includes(previewItem.id) : false}
        onClose={() => setPreviewId(null)}
        onAdd={(id) => { handleAdd(id); }}
      />
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
