<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Athes TeamPass — Org Library prototype</title>
<meta name="viewport" content="width=1280" />

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* PRD tokens — locked */
    --bg: #FAFAF9;
    --surface: #F2F1EE;
    --card: #FFFFFF;
    --fg: #272520;
    --muted: #6E6A63;
    --border: #E4E2DD;
    --border-hover: #D1CEC7;

    --primary-bg: #272520;
    --primary-text: #FFFFFF;
    --primary-border: #10100E;

    --brand-bg: #DFFA99;
    --brand-text: #52770D;
    --brand-border: #6E9D10;

    --success-bg: #D1FAE5;
    --success-text: #096745;
    --success-border: #A5F3CD;

    --error-bg: #FDF2F2;
    --error-text: #AF2828;
    --error-border: #F8C4C4;

    --warning-bg: #FDF1CE;
    --warning-text: #86580E;
    --warning-border: #FBE298;

    --info-bg: #EFF5FF;
    --info-text: #2241A3;
    --info-border: #BED3FC;

    --r-xs: 4px; --r-sm: 6px; --r-md: 8px; --r-lg: 12px; --r-xl: 16px;
    --shadow-sm: 0 1px 2px 0 #2725200F, 0 1px 1px 0 #2725200A;

    --font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  html, body { height: 100%; }
  body {
    font-family: var(--font);
    color: var(--fg);
    background: var(--bg);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; cursor: pointer; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script type="text/babel" src="org-library.jsx"></script>

</html>
